<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- Only root can own the TirfacePam1 service -->
  <policy user="root">
    <allow own="org.freedesktop.TirfacePam1"/>
    <allow send_destination="org.freedesktop.TirfacePam1"/>
  </policy>

  <!-- Allow anyone to invoke Verify and Status methods -->
  <policy context="default">
    <allow send_destination="org.freedesktop.TirfacePam1"
           send_interface="org.freedesktop.TirfacePam1"
           send_member="verify"/>
    <allow send_destination="org.freedesktop.TirfacePam1"
           send_interface="org.freedesktop.TirfacePam1"
           send_member="status"/>
    <allow send_destination="org.freedesktop.TirfacePam1"
           send_interface="org.freedesktop.DBus.Introspectable"/>
    <allow send_destination="org.freedesktop.TirfacePam1"
           send_interface="org.freedesktop.DBus.Properties"/>
  </policy>
</busconfig>
